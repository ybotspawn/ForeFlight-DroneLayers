name: Refresh UK Drone Layers

on:
  # AIRAC cycles are every 28 days on a Thursday.
  # Running weekly on Thursday morning catches each new cycle
  # within a day of it going live on the NATS site.
  schedule:
    - cron: "0 6 * * 4"   # 06:00 UTC every Thursday

  # Also allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the KMZ back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run layer generator
        run: python uk_drone_to_foreflight.py

      - name: Commit updated layer if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add layers/uk/uk_drone_restrictions.kmz
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to the layer — NATS data unchanged since last run."
          else
            AIRAC_DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: refresh UK drone layer (${AIRAC_DATE})"
            git push
          fi